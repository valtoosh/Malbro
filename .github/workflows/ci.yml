name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      MAGIC_LINK_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Lint (all workspaces)
        run: npm run lint

      - name: Test (all workspaces)
        run: npm run test

      - name: Build (all workspaces)
        run: npm run build
